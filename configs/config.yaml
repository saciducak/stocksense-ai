# ─── StockSense AI Configuration ─────────────────────────────────────────────

project:
  name: "StockSense AI"
  version: "1.0.0"
  seed: 42

# ─── Data Configuration ──────────────────────────────────────────────────────
data:
  tickers:
    - "AAPL"
  period: "10y"              # 10 years of historical data for robust training
  interval: "1d"             # Daily intervals
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  sequence_length: 60        # 60-day lookback window
  forecast_horizon: 5        # 5-day ahead prediction
  features:
    - "Open"
    - "High"
    - "Low"
    - "Close"
    - "Volume"

# ─── Feature Engineering ─────────────────────────────────────────────────────
features:
  technical_indicators:
    sma_periods: [10, 20, 50]
    ema_periods: [12, 26]
    rsi_period: 14
    macd:
      fast: 12
      slow: 26
      signal: 9
    bollinger:
      period: 20
      std_dev: 2

# ─── Model Configuration ─────────────────────────────────────────────────────
models:
  lstm:
    input_size: null          # Set dynamically based on features
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    bidirectional: true

  transformer:
    d_model: 128
    nhead: 8
    num_encoder_layers: 4
    dim_feedforward: 512
    dropout: 0.1
    max_seq_length: 512
    activation: "gelu"

  ensemble:
    strategy: "weighted_average"
    weights:
      lstm: 0.3
      transformer: 0.5
      sentiment: 0.2

# ─── NLP Configuration ───────────────────────────────────────────────────────
nlp:
  sentiment:
    model_name: "ProsusAI/finbert"
    max_length: 512
    batch_size: 16
    labels: ["positive", "negative", "neutral"]

  ner:
    model_name: "dslim/bert-base-NER"
    aggregation_strategy: "simple"

# ─── Training Configuration ──────────────────────────────────────────────────
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler:
    type: "cosine"
    warmup_steps: 500
  early_stopping:
    patience: 25
    min_delta: 0.0001
  gradient_clip: 1.0

# ─── Optimization Configuration ──────────────────────────────────────────────
optimization:
  quantization:
    method: "dynamic"         # dynamic | static | qat
    dtype: "qint8"
    calibration_samples: 100

  onnx:
    opset_version: 17
    optimize: true
    dynamic_axes: true

  benchmark:
    num_warmup: 10
    num_iterations: 100
    batch_sizes: [1, 8, 32]

# ─── MLOps Configuration ─────────────────────────────────────────────────────
mlops:
  tracking_uri: "mlruns"
  experiment_name: "stocksense-ai"
  registry:
    model_name: "stocksense-predictor"
    stages: ["None", "Staging", "Production", "Archived"]

  ab_testing:
    significance_level: 0.05
    min_samples: 100
    traffic_split:
      champion: 0.9
      challenger: 0.1

# ─── API Configuration ───────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8501"
  rate_limit: 100             # requests per minute

# ─── Logging Configuration ───────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "structured"        # structured | simple
  file: "logs/stocksense.log"
