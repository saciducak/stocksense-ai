version: "3.8"

services:
  # ─── FastAPI Prediction Server ──────────────────────────────
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Streamlit Dashboard ────────────────────────────────────
  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
    depends_on:
      - api
    restart: unless-stopped

  # ─── MLflow Tracking Server ─────────────────────────────────
  mlflow:
    build:
      context: .
      target: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    restart: unless-stopped
